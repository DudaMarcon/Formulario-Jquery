    <div class="container mt-5">
        <h2>Formulário</h2>
       
            <div class="container mt-3">
                <div class="row mb-3">
                    <div class="col-md-12 col-sm-12 mb-2">
                        <form class="cmxform" id="formExemplo" method="get" action>
                            <fieldset>
                                <div class="form-group">
                                    <label for="txtnome">Nome Completo</label>
                                    <input type="text" class="form-control" placeholder="nome aqui" id="txtnome"
                                        name="txtnome">
                                </div>
                                <div class="form-group">
                                    <label for="txtidade">Idade</label>
                                    <input type="number" step="1" class="form-control" id="txtidade" name="txtidade"
                                         placeholder="idade aqui">
                                </div>
                                <div class="form-group">
                                    <label for="txtemail">E-mail</label>
                                    <input type="email" class="form-control" placeholder="e-mail aqui" id="txtemail"
                                        name="txtemail" >
                                </div>
                                <div class="form-group">
                                    <label for="txttelefone">Telefone</label>
                                    <input type="text" class="form-control" id="txttelefone" name="txttelefone"
                                        placeholder="(00) 00000-0000">
                                </div>

                                <!-- CPF -->
                                <div class="form-group">
                                    <label for="txtcpf">CPF</label>
                                    <input type="text" class="form-control" id="txtcpf" name="txtcpf"
                                        placeholder="000.000.000-00">
                                </div>


                                <div class="form-group">
                                    <label for="txtarea">Área de interesse</label>
                                    <input type="text" class="form-control" id="txtarea" name="txtarea"
                                        placeholder="Digite sua área de interesse">
                                </div>


                                <div class="form-group">
                                    <label for="txtexperiencia">Experiência</label>
                                    <textarea class="form-control" id="txtexperiencia" name="txtexperiencia" rows="4"
                                        placeholder="descreva sua experiência"></textarea>
                                </div>


                                <div class="form-group">
                                    <label for="txtsenha">Senha</label>
                                    <input type="password" class="form-control" id="txtsenha" name="txtsenha"
                                        placeholder="senha">
                                </div>

                                <div class="form-group">
                                    <label for="txtconfirmar">Confirmar senha</label>
                                    <input type="password" class="form-control" id="txtconfirmar" name="txtconfirmar"
                                        placeholder="confirme a senha">
                                </div>
                                <input type="submit" class="btn btn-danger" value="Enviar">
                    </div>
                    </fieldset>
        </form>
    </div>
    </div>
